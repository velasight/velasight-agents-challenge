steps:
  # ── Backend ──────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-api:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-api'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'velasight-explore-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=NEO4J_URI=neo4j-uri:latest,NEO4J_USER=neo4j-user:latest,NEO4J_PASSWORD=neo4j-password:latest,API_TOKEN=velasight-api-token:latest'
      - '--set-env-vars=ALLOWED_ORIGINS=https://explore.velasight.com'

  # ── Frontend ─────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['deploy-backend']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-ui:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-ui:latest'
      - '--build-arg=VITE_MAPBOX_TOKEN=$$MAPBOX_TOKEN'
      - '--build-arg=VITE_API_URL=https://velasight-explore-api-HASH-uc.a.run.app/api/v1'
      - '--build-arg=VITE_VAPI_PUBLIC_KEY=$$VAPI_PUBLIC_KEY'
      - '--build-arg=VITE_VAPI_ASSISTANT_ID=$$VAPI_ASSISTANT_ID'
      - './frontend'
    secretEnv: ['MAPBOX_TOKEN', 'VAPI_PUBLIC_KEY', 'VAPI_ASSISTANT_ID']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-ui'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'velasight-explore-ui'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-ui:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=20'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/mapbox-token/versions/latest
      env: 'MAPBOX_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/vapi-public-key/versions/latest
      env: 'VAPI_PUBLIC_KEY'
    - versionName: projects/$PROJECT_ID/secrets/vapi-assistant-id/versions/latest
      env: 'VAPI_ASSISTANT_ID'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/velasight/explore-ui:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
