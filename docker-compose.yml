version: '3.9'

services:
  api:
    build: ./backend
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    restart: unless-stopped

  ui:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:8080"
    depends_on:
      - api
    restart: unless-stopped

